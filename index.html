<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Operations Dashboard</title>

<link rel="icon" href="https://justingps.github.io/dpr/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#f3f4f6;
color:#111827;
}

/* HEADER */

.header{
height:70px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:40px;
}

/* LAYOUT */

.layout{
display:flex;
height:calc(100vh - 70px);
}

/* SIDEBAR */

.sidebar{
width:220px;
background:white;
border-right:1px solid #e5e7eb;
padding-top:20px;
}

.sidebar button{
width:100%;
border:none;
background:none;
padding:15px;
text-align:left;
cursor:pointer;
font-weight:500;
}

.sidebar button:hover{
background:#f3f4f6;
}

.sidebar .active{
background:#2563eb;
color:white;
}

/* CONTENT */

.content{
flex:1;
padding:25px;
overflow:auto;
}

/* KPI */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-bottom:20px;
}

.kpi{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.06);
}

.kpi-value{
font-size:24px;
font-weight:600;
}

/* CARDS */

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 5px 12px rgba(0,0,0,0.06);
margin-bottom:20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #e5e7eb;
font-size:13px;
}

th{
background:#f9fafb;
}

/* FILTER */

.filters{
margin-bottom:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filters input{
padding:8px;
border:1px solid #d1d5db;
border-radius:6px;
}

.dark{
background:#111827;
color:white;
}

.dark .card,
.dark .kpi,
.dark .sidebar,
.dark .header{
background:#1f2937;
color:white;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
<img src="https://justingps.github.io/dpr/logo.png">
<b>GPS Operations Dashboard</b>
</div>

<div>

<button onclick="toggleDark()">🌙</button>

</div>

</div>

<div class="layout">

<div class="sidebar">

<button class="tab active" data-tab="summary">Summary</button>
<button class="tab" data-tab="reports">Reports</button>
<button class="tab" data-tab="status">Status</button>
<button class="tab" data-tab="resource">Resources</button>

</div>

<div class="content">

<!-- SUMMARY -->

<div id="summary" class="page">

<div class="kpi-grid">

<div class="kpi">
<div class="kpi-value" id="kpiCrew">0</div>
Crew Today
</div>

<div class="kpi">
<div class="kpi-value" id="kpiForeman">0</div>
Foremen
</div>

<div class="kpi">
<div class="kpi-value" id="kpiEquipment">0</div>
Equipment
</div>

<div class="kpi">
<div class="kpi-value" id="kpiProjects">0</div>
Projects
</div>

</div>

<div class="grid">

<div class="card">
<h3>Crew Allocation</h3>
<canvas id="chartCrew"></canvas>
</div>

<div class="card">
<h3>Crew Trend</h3>
<canvas id="chartTrend"></canvas>
</div>

</div>

</div>

<!-- REPORTS -->

<div id="reports" class="page" style="display:none">

<div class="filters">
<input type="date" id="reportDate">
<input id="searchWI" placeholder="Search WI">
</div>

<div class="card">

<table>

<thead>
<tr>
<th>#</th>
<th>Foreman</th>
<th>WI No</th>
<th>Area</th>
<th>Crew</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

</div>

<!-- STATUS -->

<div id="status" class="page" style="display:none">

<div class="card">

<table>

<thead>
<tr>
<th>#</th>
<th>Foreman</th>
<th>Project</th>
<th>Area</th>
<th>Crew</th>
</tr>
</thead>

<tbody id="statusTable"></tbody>

</table>

</div>

</div>

<!-- RESOURCE -->

<div id="resource" class="page" style="display:none">

<div class="card">

<table>

<thead>
<tr>
<th>#</th>
<th>Resource ID</th>
<th>Designation</th>
<th>Project</th>
<th>Area</th>
</tr>
</thead>

<tbody id="resourceTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

/* GOOGLE SHEET */

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRMvKP4HfM5zZpM3RjdpPcX0DZA3yWpGhXt_lqpzblpbIQW7vcJswPPm8gMdmVZ366FCUwZGLCsF1fb/pub?gid=0&single=true&output=csv"

let data=[]

async function loadData(){

const res=await fetch(SHEET_URL)

const csv=await res.text()

data=parseCSV(csv)

updateDashboard()

}

function parseCSV(csv){

const rows=csv.split("\n")

const headers=rows[0].split(",")

return rows.slice(1).map(r=>{
const obj={}
r.split(",").forEach((v,i)=>obj[headers[i]]=v)
return obj
})

}

/* DASHBOARD */

function updateDashboard(){

document.getElementById("kpiCrew").innerText=data.length

const foremen=new Set(data.map(d=>d["FOREMAN NAME"]))

document.getElementById("kpiForeman").innerText=foremen.size

const equipment=data.filter(d=>d["MANPOWER / EQUIPMENT"]=="Equipment")

document.getElementById("kpiEquipment").innerText=equipment.length

const projects=new Set(data.map(d=>d["WI NO"]))

document.getElementById("kpiProjects").innerText=projects.size

renderTables()

renderCharts()

}

/* TABLE */

function renderTables(){

const reportTable=document.getElementById("reportTable")

reportTable.innerHTML=""

data.slice(0,30).forEach((r,i)=>{

reportTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r["FOREMAN NAME"]}</td>
<td>${r["WI NO"]}</td>
<td>${r["AREA / BLOCK"]}</td>
<td>${r["RESOURCE ID"]}</td>
</tr>
`

})

document.getElementById("statusTable").innerHTML=reportTable.innerHTML

document.getElementById("resourceTable").innerHTML=reportTable.innerHTML

}

/* CHART */

function renderCharts(){

new Chart(document.getElementById("chartCrew"),{
type:"bar",
data:{
labels:["Area1","Area2","Area3"],
datasets:[{label:"Crew",data:[12,19,7]}]
}
})

new Chart(document.getElementById("chartTrend"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu"],
datasets:[{label:"Crew",data:[10,14,12,18]}]
}
})

}

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark")
}

/* TABS */

document.querySelectorAll(".tab").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.querySelectorAll(".page").forEach(p=>p.style.display="none")

document.getElementById(btn.dataset.tab).style.display="block"

}

})

/* AUTO REFRESH */

setInterval(loadData,300000)

loadData()

</script>

</body>
</html>
